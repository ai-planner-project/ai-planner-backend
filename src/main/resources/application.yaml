spring:
  application:
    name: ai-study-planner

  datasource:
    url: jdbc:h2:mem:aistudyplanner
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
    show-sql: true

jwt:
  secret: mysupersecretkeymysupersecretkeymysupersecretkey1234
  access-token-expiration: 3600000
  refresh-token-expiration: 1209600000

server:
  port: 8080